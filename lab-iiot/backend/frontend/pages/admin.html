<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="header">
    <h1>Panel Admin</h1>
  </div>
  <div id="qr-code" style="text-align: center; margin: 20px 0;"></div>
  <div class="container" id="admin-content">Cargando...</div>
  <script src="/js/admin.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    var qrContainer = document.getElementById('qr-code');
    if (qrContainer) {
      new QRCode(qrContainer, {
        text: window.location.href,
        width: 200,
        height: 200
      });
    }
  });
  </script>
</body>
</html>

<div id="qr-code" style="text-align: center; margin: 20px 0;"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  var qr = document.getElementById("qr-code");
  if(qr) new QRCode(qr, {text: window.location.href, width: 200, height: 200});
});
</script>
